<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Presence Companion</title>
<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{

    width:100%;
    height:100%;
    overflow:hidden;

    background:#050505;

    font-family:
    -apple-system,
    BlinkMacSystemFont,
    "SF Pro Display",
    sans-serif;

    color:white;

}

body{

    display:flex;
    justify-content:center;
    align-items:center;

}

#background{

    position:fixed;

    inset:0;

    background:
    radial-gradient(circle at center,
    rgba(255,255,255,.04),
    transparent 60%);

}

#camera{

    position:fixed;

    inset:0;

    width:100%;
    height:100%;

    object-fit:cover;

    opacity:.08;

    transform:scaleX(-1);

}

#container{

    position:relative;

    width:100%;
    height:100%;

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

}

#orb{

    width:170px;
    height:170px;

    border-radius:50%;

    border:1px solid rgba(255,255,255,.18);

    box-shadow:

    0 0 80px rgba(255,255,255,.08),

    inset 0 0 40px rgba(255,255,255,.04);

    animation:breathe 8s ease-in-out infinite;

}

@keyframes breathe{

0%{

transform:scale(.92);

}

50%{

transform:scale(1.10);

}

100%{

transform:scale(.92);

}

}

#message{

    margin-top:48px;

    font-size:38px;

    font-weight:300;

    letter-spacing:-1px;

    transition:.8s;

}

#subtitle{

    margin-top:16px;

    font-size:19px;

    color:rgba(255,255,255,.65);

    transition:.8s;

}

#footer{

    position:absolute;

    bottom:42px;

    letter-spacing:8px;

    font-size:12px;

    color:rgba(255,255,255,.35);

}


#reflectionOverlay{
position:fixed;inset:0;
display:none;
justify-content:center;
align-items:center;
background:rgba(5,5,5,.82);
backdrop-filter:blur(18px);
opacity:0;
transition:opacity .8s;
z-index:20;
}
#card{
width:min(430px,88vw);
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.12);
border-radius:28px;
padding:28px;
box-shadow:0 20px 60px rgba(0,0,0,.35);
}
#card h2{font-weight:300;margin-bottom:8px}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin:18px 0}
.chip{padding:8px 14px;border-radius:999px;background:rgba(255,255,255,.08)}
.btns{display:flex;gap:12px;margin-top:22px}
.btn{padding:11px 18px;border-radius:999px;border:none;cursor:pointer}

</style>
</head>

<body>
<div id="background"></div>
<video autoplay="" id="camera" muted="" playsinline="">
</video>
<div id="container">
<div id="orb"></div>
<div id="message">

I'm here.

</div>
<div id="subtitle">

Take your time.

</div>
<div id="footer">

P R E S E N C E

</div>
</div>

<script>
const camera=document.getElementById("camera");
const message=document.getElementById("message");
const subtitle=document.getElementById("subtitle");
const overlay=document.getElementById("reflectionOverlay");
const dateLine=document.getElementById("dateLine");
let sessionStart=Date.now();

async function startCamera(){
 try{
  const s=await navigator.mediaDevices.getUserMedia({video:true});
  camera.srcObject=s;
 }catch(e){
  subtitle.innerHTML="Camera permission denied.";
 }
}
startCamera();

function fadeText(t,s){
 message.style.opacity=0; subtitle.style.opacity=0;
 setTimeout(()=>{message.innerHTML=t;subtitle.innerHTML=s;message.style.opacity=1;subtitle.style.opacity=1;},350);
}
[
[3000,"Take one slow breath.","Nothing to achieve."],
[9000,"Notice your shoulders.","Let them soften."],
[18000,"Stay here.","The AI stays present with you."],
[30000,"Would you like to stop here?","Press SPACE whenever you feel ready."]
].forEach(x=>setTimeout(()=>fadeText(x[1],x[2]),x[0]));

document.addEventListener("keydown",e=>{
 if(e.code==="Space"){e.preventDefault();showReflection();}
});

function showReflection(){
 const mins=Math.max(1,Math.round((Date.now()-sessionStart)/60000));
 dateLine.textContent=new Date().toLocaleDateString()+" • "+mins+" min";
 overlay.style.display="flex";
 requestAnimationFrame(()=>overlay.style.opacity="1");
}
function closeReflection(){
 overlay.style.opacity="0";
 setTimeout(()=>overlay.style.display="none",700);
}
</script>

<div id="reflectionOverlay">
  <div id="card">
    <div style="opacity:.6;font-size:13px" id="dateLine"></div>
    <h2>Inner Journey</h2>
    <div id="summary">How does your body feel now?</div>
    <div class="chips">
      <div class="chip">calm</div>
      <div class="chip">aware</div>
      <div class="chip">lighter</div>
    </div>
    <div style="font-style:italic;opacity:.82">
      "The AI stayed present with you. Quiet became your progress."
    </div>
    <div class="btns">
      <button class="btn" onclick="closeReflection()">Continue</button>
      <button class="btn" onclick="alert('Prototype shared!')">Share</button>
    </div>
  </div>
</div>

</body>
</html>
